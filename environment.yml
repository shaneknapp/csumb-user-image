name: csumb-user-image
# This is the standard conda configuration file. Use this file to list
# the conda packages that you need installed in your environment.
channels:
  - conda-forge

dependencies:
  # Items required for basic level functionality
  # pinned so the conda solver satisfies cyclopts's attrs>=23.1.0 (pip) requirement;
  # also squelches the attrs version warning emitted when running the notebook tests
  - attrs==26.1.0
  - gh-scoped-creds==4.1
  - git==2.54.0
  - ipykernel==7.3.0
  - ipython==9.15.0
  - jupyter-resource-usage=1.2.1
  # pinned to match the deployed hub image's jupyterhub version
  - jupyterhub==5.5.0
  - jupyterlab==4.5.9
  - jupyter-archive==3.4.0
  - jupyter_server==2.20.0
  - jupyterlab-git==0.54.0
  - jupyterlab_rise==0.43.1
  - jupytext==1.19.3
  - notebook==7.5.7
  - python==3.13.*
  - pip #==26.1.2
  - regex==2026.5.9
  - sqlite==3.53.2

  # r2d installs jupyter-rsession-proxy, but in the base python env, not in the updated one
  - jupyter-rsession-proxy==2.5.1

  # vscode
  - code-server==4.124.2
  - jupyter-vscode-proxy==0.7
  - jupyter-server-proxy==4.5.0

  # sagemath (library only -- no rpy2/r-base, so no conda R PATH conflict)
  - sagelib==10.9

  # data science
  - csvkit==2.2.0
  - datascience==0.18.1
  - matplotlib==3.11.0
  - numpy==2.4.6
  - geopandas==1.1.3
  - geopy==2.4.1
  - openpyxl==3.1.5
  - pandas==3.0.3
  - plotly==6.8.0
  - pyarrow==24.0.0
  - pytest==9.1.0
  - scikit-learn==1.9.0
  - scipy==1.17.1
  - seaborn==0.13.2
  - statsmodels==0.14.6
  - sympy==1.14.0
  - uplot-python==1.1.1

  # database tooling
  - jupysql==0.11.1
  - duckdb==1.5.4
  - duckdb-engine==0.15.0

  # pip installed packages, conda is preferred
  - pip:
    - nbgitpuller==1.3.0

    # - jupyterlab-a11y-checker==0.2.7
    # useful for debugging python package issues
    - pip-tree==5.0.0
    - pipdeptree==3.1.0

    # r2d installs jupyter-shiny-proxy, but in the base python env, not in the updated one
    - jupyter-shiny-proxy==1.4
    - nbconvert[webpdf]==7.17.1
    - otter-grader==6.1.6

    # tensorflow has no conda-forge cp313 build; install from PyPI (cp313 wheel) under python 3.13
    - tensorflow==2.21.0
